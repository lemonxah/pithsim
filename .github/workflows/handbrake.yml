# Handbrake firmware — its own release stream (handbrake-v*), versioned
# independently of the DDU's ddu-v* stream. Built on every push so
# breakage is caught in CI; a tag publishes the release assets.
name: handbrake

on:
  push:
    branches: [main]
    tags: ['handbrake-v*']
  pull_request:
  workflow_dispatch:

jobs:
  handbrake:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/handbrake
    steps:
      - uses: actions/checkout@v4

      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s2
          ldproxy: true

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build (release)
        run: cargo build --release

      # Two assets: the bare app image (streamed over @OTA by the dashboard)
      # and the full merged image (bootloader + partition table + app, written
      # at 0x0 over the ROM bootloader — recovery + one-time migration from
      # the pre-OTA single-factory layout).
      - name: Save app + full images
        run: |
          espflash save-image --chip esp32s2 \
            target/xtensa-esp32s2-espidf/release/pith-hb pith-hb-lolin_s2_mini.bin
          espflash save-image --chip esp32s2 --merge --partition-table partitions.csv \
            target/xtensa-esp32s2-espidf/release/pith-hb pith-hb-lolin_s2_mini-full.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-hb-lolin_s2_mini
          path: |
            firmware/handbrake/pith-hb-lolin_s2_mini.bin
            firmware/handbrake/pith-hb-lolin_s2_mini-full.bin
          if-no-files-found: error

  release:
    needs: [handbrake]
    if: startsWith(github.ref, 'refs/tags/handbrake-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish handbrake release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.bin
          generate_release_notes: true
          fail_on_unmatched_files: true

# Pedals firmware — its own release stream (pedals-v*), versioned
# independently of the other devices' streams. Built on every push so
# breakage is caught in CI; a tag publishes the release assets.
name: pedals

on:
  push:
    branches: [main]
    tags: ['pedals-v*']
  pull_request:
  workflow_dispatch:

jobs:
  pedals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/pedals
    steps:
      - uses: actions/checkout@v4

      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build (release)
        run: cargo build --release

      # Two assets: the bare app image (streamed over @OTA by the dashboard)
      # and the full merged image (bootloader + partition table + app, written
      # at 0x0 in ROM download mode — the recovery/first-flash path).
      # Target: gilphilbert's PCBA V2 board, v2.2 Rev B (ESP32-S3FH4R2).
      - name: Save app + full images
        run: |
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/pith-pedals pith-pedals-pcba_v2.2b.bin
          espflash save-image --chip esp32s3 --merge --partition-table partitions.csv \
            target/xtensa-esp32s3-espidf/release/pith-pedals pith-pedals-pcba_v2.2b-full.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-pedals-pcba_v2.2b
          path: |
            firmware/pedals/pith-pedals-pcba_v2.2b.bin
            firmware/pedals/pith-pedals-pcba_v2.2b-full.bin
          if-no-files-found: error

  release:
    needs: [pedals]
    if: startsWith(github.ref, 'refs/tags/pedals-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish pedals release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.bin
          generate_release_notes: true
          fail_on_unmatched_files: true

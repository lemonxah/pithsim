name: firmware

on:
  push:
    branches: [main]
    tags: ['firmware-v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Cross-compile the firmware for the XIAO ESP32-S3 and produce the app image.
  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/ddu
    steps:
      - uses: actions/checkout@v4

      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build (release)
        run: cargo build --release

      - name: Save app image
        run: |
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/pithddu pithddu-xiao_s3.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao_s3
          path: firmware/ddu/pithddu-xiao_s3.bin
          if-no-files-found: error

  # The handbrake firmware (ESP32-S2 / Lolin S2 Mini). Published in the SAME
  # firmware-v* release as the DDU image, under its own asset name, so the
  # dashboard can update every connected device from one release.
  handbrake:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/handbrake
    steps:
      - uses: actions/checkout@v4

      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s2
          ldproxy: true

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build (release)
        run: cargo build --release

      - name: Save app image
        run: |
          espflash save-image --chip esp32s2 \
            target/xtensa-esp32s2-espidf/release/pith-hb pith-hb-lolin_s2_mini.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-hb-lolin_s2_mini
          path: firmware/handbrake/pith-hb-lolin_s2_mini.bin
          if-no-files-found: error

  # The factory recovery app (BIOS/rescue console). Built on every push so a
  # change that breaks it is caught in CI, not at the next full device flash.
  recovery:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pith-recovery
    steps:
      - uses: actions/checkout@v4
      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - name: Install espflash
        run: cargo install espflash --locked
      - name: Build (release)
        run: cargo build --release
      - name: Save app image
        run: |
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/pith-recovery pith-recovery-xiao_s3.bin
      - uses: actions/upload-artifact@v4
        with:
          name: recovery-xiao_s3
          path: pith-recovery/pith-recovery-xiao_s3.bin
          if-no-files-found: error

  release:
    needs: [firmware, handbrake, recovery]
    if: startsWith(github.ref, 'refs/tags/firmware-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish firmware release
        uses: softprops/action-gh-release@v2
        with:
          # Bare per-board app images: the main firmware the dashboard installs
          # by board name, plus the factory recovery image for full flashes.
          files: dist/**/*.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
